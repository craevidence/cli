name: CI - Build, Test, SBOM, Publish

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "LICENSE"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      resume_release:
        description: >-
          Exact existing release tag to resume publishing (for example
          v3.8.1). The run uses the current pipeline code on this branch,
          checks every published artifact, and performs only the missing
          operations. Leave empty for a normal CI run.
        required: false
        default: ""
        type: string
  release:
    types: [published]

permissions:
  contents: read

# A release or resume run holds the one release-publish concurrency group from
# its first job to its last, so two publishing runs can never interleave
# registry checks and pushes. A running publish is never canceled; with
# GitHub's default queue behavior at most one further run stays pending behind
# it. Other events group per ref and cancel superseded runs.
concurrency:
  group: ${{ (github.event_name == 'release' || inputs.resume_release != '') && 'release-publish' || format('ci-{0}-{1}', github.event_name, github.ref) }}
  cancel-in-progress: ${{ !(github.event_name == 'release' || inputs.resume_release != '') }}

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Run tests
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Job 2: Rule pack structural gate + engine gate + dist content guard
  # ---------------------------------------------------------------------------
  rulepack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build

      - name: Read pinned opengrep version
        id: opengrep-version
        run: |
          VERSION=$(python -c "from cra_evidence_cli.local.rules_pack import TESTED_OPENGREP_VERSION; print(TESTED_OPENGREP_VERSION)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install opengrep ${{ steps.opengrep-version.outputs.version }}
        run: |
          VERSION="${{ steps.opengrep-version.outputs.version }}"
          ARCH="$(uname -m)"
          # Map uname arch to the opengrep release asset name and its pinned
          # checksum. The hashes are tied to the pinned engine version; bumping
          # TESTED_OPENGREP_VERSION requires updating them here.
          case "$ARCH" in
            x86_64)
              OG_ASSET="opengrep_manylinux_x86"
              OG_SHA256="9ac4aebb47ba3f7b0d8fc641ac8749cb6c2f253f616131a67d9631e00d4bea33"
              ;;
            aarch64)
              OG_ASSET="opengrep_manylinux_aarch64"
              OG_SHA256="fd40124272d006082a5594b19aecee07b01dd50933d8add7a4fd5c557d2be5f6"
              ;;
            *) echo "Unsupported arch: $ARCH" >&2; exit 1 ;;
          esac
          if [ "$VERSION" != "1.25.0" ]; then
            echo "::error::pinned opengrep checksums are for 1.25.0 but TESTED_OPENGREP_VERSION is ${VERSION}; update the checksums in this step"
            exit 1
          fi
          URL="https://github.com/opengrep/opengrep/releases/download/v${VERSION}/${OG_ASSET}"
          curl -fsSL "$URL" -o /tmp/opengrep
          echo "${OG_SHA256}  /tmp/opengrep" | sha256sum -c -
          install -m 0755 /tmp/opengrep /usr/local/bin/opengrep
          opengrep --version

      - name: Structural gate (pyyaml)
        run: pytest tests/test_rulepack.py -v --tb=short

      - name: Engine gate (opengrep per-rule)
        run: bash scripts/rulepack_gate.sh

      - name: Dist content guard
        run: python scripts/check_dist.py

  # ---------------------------------------------------------------------------
  # Job 3: Build Docker image, generate SBOM, upload to CRA Evidence
  # ---------------------------------------------------------------------------
  build-and-sbom:
    runs-on: ubuntu-latest
    needs: [test, rulepack]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Get version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      # Login to the DHI registry to pull pinned base images. When DHI_REGISTRY_USERNAME
      # or DHI_REGISTRY_TOKEN is absent (e.g., forks or PRs without repository secrets),
      # the step fails gracefully and the local build falls back to public Python base
      # images via --build-arg (see the build step below).
      - name: Login to DHI registry
        id: dhi-login
        continue-on-error: true
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_REGISTRY_USERNAME }}
          password: ${{ secrets.DHI_REGISTRY_TOKEN }}

      # Publishing paths (main pushes, releases, manual dispatch) must never
      # build from the public fallback bases: an image labeled as hardened has
      # to be built from the hardened base. Only pull requests, which never
      # publish, may fall back.
      - name: Require the hardened base for publishing builds
        if: github.event_name != 'pull_request' && steps.dhi-login.outcome != 'success'
        run: |
          echo "::error::DHI registry login failed; refusing to build a publishing image from public fallback base images"
          exit 1

      # Publishing builds must also use the current hardened base, not a stale
      # pin that still happens to resolve. Strict mode fails when a pinned
      # digest is no longer the tag's current digest.
      - name: Verify the pinned DHI base digests are current
        if: github.event_name != 'pull_request'
        run: bash scripts/check-dhi-base.sh --strict

      - name: Build CLI Docker image
        run: |
          if [ "${{ steps.dhi-login.outcome }}" = "success" ]; then
            docker build -t craevidence:${{ steps.version.outputs.version }} .
          else
            # Pull-request fallback: public Python base images, with labels
            # overridden so the image records the base actually used.
            docker build \
              --build-arg BASE_IMAGE_BUILDER=python:3.14 \
              --build-arg BASE_IMAGE=python:3.14-slim \
              --build-arg BASE_IMAGE_NAME=python:3.14-slim \
              --build-arg IMAGE_DESCRIPTION="CLI tool for CI/CD integration with CRA Evidence - public Python base fallback build" \
              --build-arg SECURITY_HARDENED=false \
              --build-arg SECURITY_NO_SHELL=false \
              --build-arg SECURITY_NO_PACKAGE_MANAGER=false \
              -t craevidence:${{ steps.version.outputs.version }} .
          fi

      # Every security label and the actual shell/package-manager surface must
      # match the base the image was actually built from, for both variants.
      - name: Assert image labels match the built base
        run: |
          image="craevidence:${{ steps.version.outputs.version }}"
          hardened=$(docker inspect "$image" --format '{{index .Config.Labels "eu.cra.security.hardened"}}')
          noshell=$(docker inspect "$image" --format '{{index .Config.Labels "eu.cra.security.no-shell"}}')
          nopkg=$(docker inspect "$image" --format '{{index .Config.Labels "eu.cra.security.no-package-manager"}}')
          base=$(docker inspect "$image" --format '{{index .Config.Labels "org.opencontainers.image.base.name"}}')
          if [ "${{ steps.dhi-login.outcome }}" = "success" ]; then
            expected="true"; expected_base="dhi.io/python:3.14"
            if docker run --rm --entrypoint /bin/sh "$image" -c "true" 2>/dev/null; then
              echo "::error::hardened image unexpectedly contains a shell"
              exit 1
            fi
            if docker run --rm --entrypoint /usr/bin/dpkg "$image" --version >/dev/null 2>&1; then
              echo "::error::hardened image unexpectedly contains a package manager"
              exit 1
            fi
          else
            expected="false"; expected_base="python:3.14-slim"
            if ! docker run --rm --entrypoint /bin/sh "$image" -c "true" 2>/dev/null; then
              echo "::error::fallback image is missing the shell its labels declare"
              exit 1
            fi
            if ! docker run --rm --entrypoint /usr/bin/dpkg "$image" --version >/dev/null 2>&1; then
              echo "::error::fallback image is missing the package manager its labels declare"
              exit 1
            fi
          fi
          if [ "$hardened" != "$expected" ] || [ "$noshell" != "$expected" ] || [ "$nopkg" != "$expected" ] || [ "$base" != "$expected_base" ]; then
            echo "::error::image labels (hardened=$hardened, no-shell=$noshell, no-package-manager=$nopkg, base=$base) do not match the built base (expected $expected / $expected_base)"
            exit 1
          fi

      # Security gate: fail the build if HIGH/CRITICAL vulnerabilities with a
      # published fix are found in the Docker image. The gate script pins the
      # Grype version and refreshes the vulnerability database, so CI and local
      # pre-push runs produce the same result. Suppressions live in
      # .github/grype.yaml; accepted findings without a fix are tracked in
      # .github/grype-watchlist.yaml.
      # On pull requests without DHI credentials the scan runs against the
      # public-base fallback image, so its findings are informational there;
      # every publishing path blocks on the gate.
      - name: Scan image for vulnerabilities (Grype)
        continue-on-error: ${{ steps.dhi-login.outcome != 'success' }}
        run: bash scripts/check-image-gate.sh craevidence:${{ steps.version.outputs.version }}

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0

      - name: Generate SBOM (CycloneDX)
        # The hardened base ships the dpkg database in both the classic
        # /var/lib/dpkg/status format and the distroless-style status.d
        # directory, so Syft catalogs every Debian package twice. Exclude the
        # status.d copy to keep one entry per package.
        run: |
          syft craevidence:${{ steps.version.outputs.version }} \
            --exclude '/var/lib/dpkg/status.d/**' \
            -o cyclonedx-json=sbom.cdx.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom
          path: sbom.cdx.json

  # ---------------------------------------------------------------------------
  # Job 4: Validate the release tag (on release)
  # ---------------------------------------------------------------------------
  # Read-only gate that runs before any publishing job: the GitHub release tag
  # must match the package version exactly. Publishing jobs consume the
  # validated version from this job instead of re-deriving it.
  validate-release:
    runs-on: ubuntu-latest
    needs: [test, rulepack, build-and-sbom]
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.resume_release != '')
    permissions:
      contents: read
    outputs:
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
      mode: ${{ steps.check.outputs.mode }}
      source_sha: ${{ steps.check.outputs.source_sha }}
      build_allowed: ${{ steps.check.outputs.build_allowed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Release mode: the checkout is the tag commit, so the tag must match the
      # package version it carries, and the event commit SHA is the immutable
      # source anchor for the whole run. Resume mode: the run executes the
      # current pipeline code against an exact already-published release; the
      # tag is resolved to a commit SHA exactly once, here, and every later
      # checkout uses that SHA, so a tag moved after validation can never
      # change what gets built. Building anything NEW on a resume additionally
      # requires the GitHub release to be immutable, because a mutable tag
      # gives a rebuild no trustworthy source; completing already-published
      # artifacts needs no rebuild and stays allowed.
      - name: Resolve and validate the release to publish
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
          EVENT_SHA: ${{ github.sha }}
          RESUME_TAG: ${{ inputs.resume_release }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "release" ]; then
            mode="release"
            tag="${RELEASE_TAG}"
            # Prereleases also fire release:published; they must never reach
            # the immutable publishing channels.
            if [ "${RELEASE_PRERELEASE}" != "false" ]; then
              echo "::error::'${tag}' is a prerelease; only stable releases publish"
              exit 1
            fi
            VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            if [ "${tag}" != "v${VERSION}" ]; then
              echo "::error::Release tag '${tag}' does not match package version 'v${VERSION}'"
              exit 1
            fi
            source_sha="${EVENT_SHA}"
            build_allowed="true"
          else
            mode="resume"
            tag="${RESUME_TAG}"
            # A resume publishes with this run's branch identity, so it may
            # only run from main: reviewed code, and the exact identity the
            # verifiers and documentation accept.
            if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
              echo "::error::resume runs only from main (got '${GITHUB_REF}')"
              exit 1
            fi
            if ! printf '%s' "${tag}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::resume_release must be an exact release tag like v3.8.1, got '${tag}'"
              exit 1
            fi
            state="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" --jq '[.draft, .prerelease, .immutable // false] | @tsv')" || {
              echo "::error::no GitHub release exists for '${tag}'"; exit 1; }
            IFS="$(printf '\t')" read -r draft prerelease immutable <<< "${state}"
            if [ "${draft}" != "false" ] || [ "${prerelease}" != "false" ]; then
              echo "::error::release '${tag}' is a draft or prerelease; only published stable releases can be resumed"
              exit 1
            fi
            # Only the newest stable release may be resumed: the run ends by
            # moving the latest tags, and resuming an older release would roll
            # them backward.
            newest="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)"
            if [ "${newest}" != "${tag}" ]; then
              echo "::error::'${tag}' is not the newest stable release ('${newest}'); resuming it would move latest backward"
              exit 1
            fi
            # Resolve the tag to a commit exactly once; annotated tags are
            # peeled to the commit they point at.
            source_sha="$(git ls-remote origin "refs/tags/${tag}^{}" | awk '{print $1; exit}')"
            if [ -z "${source_sha}" ]; then
              source_sha="$(git ls-remote origin "refs/tags/${tag}" | awk '{print $1; exit}')"
            fi
            if ! printf '%s' "${source_sha}" | grep -qE '^[0-9a-f]{40}$'; then
              echo "::error::cannot resolve git tag '${tag}' on origin"
              exit 1
            fi
            if [ "${immutable}" = "true" ]; then
              build_allowed="true"
            else
              build_allowed="false"
            fi
            VERSION="${tag#v}"
          fi
          echo "publishing mode '${mode}' for tag '${tag}' (version ${VERSION}, source ${source_sha}, build_allowed ${build_allowed})"
          {
            echo "version=${VERSION}"
            echo "tag=${tag}"
            echo "mode=${mode}"
            echo "source_sha=${source_sha}"
            echo "build_allowed=${build_allowed}"
          } >> "$GITHUB_OUTPUT"

      # The release tag is mutable unless immutable releases are enabled, so
      # the checked-out release source is bound to the published artifacts
      # cryptographically: its pyproject version must match the tag, and the
      # byte-reproducible wheel it builds must equal the wheel PyPI or the
      # release assets already serve. A moved tag, even one keeping the same
      # version string, builds different wheel bytes and fails here before
      # either publishing job starts. On a first publish nothing is published
      # yet and the checked-out source is the canonical input, exactly as in a
      # release run.
      - name: Check out the release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ steps.check.outputs.source_sha }}
          path: release-src

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.14"

      - name: Bind the release source to the published artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.check.outputs.tag }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          src_version=$(grep '^version' release-src/pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "v${src_version}" != "${RELEASE_TAG}" ]; then
            echo "::error::release source at '${RELEASE_TAG}' carries package version '${src_version}'"
            exit 1
          fi
          python -m pip install --quiet pip==26.1.2 build==1.5.0
          # The wheel bytes depend on the source file modes and the process
          # umask as well as the pinned tools and epoch; umask 022 matches the
          # published builds.
          umask 022
          SOURCE_DATE_EPOCH=946684800 python -m build --wheel --outdir bind-check release-src > /dev/null
          built=$(sha256sum bind-check/*.whl | awk '{print $1}')
          published=$(python - <<'EOF'
          import json
          import os
          import urllib.error
          import urllib.request

          version = os.environ["RELEASE_TAG"].removeprefix("v")
          wheel = f"craevidence-{version}-py3-none-any.whl"
          try:
              with urllib.request.urlopen(
                  f"https://pypi.org/pypi/craevidence/{version}/json", timeout=30
              ) as response:
                  data = json.load(response)
          except urllib.error.HTTPError as err:
              if err.code == 404:
                  raise SystemExit(0)
              raise
          for entry in data["urls"]:
              if entry["filename"] == wheel:
                  print(entry["digests"]["sha256"])
          EOF
          )
          if [ -n "${published}" ]; then
            if [ "${built}" != "${published}" ]; then
              echo "::error::the release source does not rebuild the published wheel (built ${built}, PyPI serves ${published}); the tag no longer points at the released source"
              exit 1
            fi
            echo "release source verified against the published wheel"
          else
            wheel_asset="craevidence-${version}-py3-none-any.whl"
            if gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name' | grep -Fqx -- "${wheel_asset}"; then
              gh release download "${RELEASE_TAG}" --pattern "${wheel_asset}" --dir bind-asset
              asset=$(sha256sum "bind-asset/${wheel_asset}" | awk '{print $1}')
              if [ "${built}" != "${asset}" ]; then
                echo "::error::the release source does not rebuild the checkpointed wheel (built ${built}, asset ${asset})"
                exit 1
              fi
              echo "release source verified against the checkpointed wheel"
            else
              echo "nothing published yet for ${RELEASE_TAG}; the release source is the canonical input"
            fi
          fi

  # ---------------------------------------------------------------------------
  # Job 5: Publish release images (on release)
  # ---------------------------------------------------------------------------
  # Least-privilege split: only the release-gated jobs hold registry-push and
  # OIDC permissions, and this one runs behind the approval-protected
  # release-images environment. It builds the canonical index once (or reuses
  # a published one), copies it by digest to the other registries, signs and
  # verifies every copy, and publishes the digest-bound per-platform SBOMs.
  # The latest tags move in finalize-release only after PyPI also succeeds.
  # GHCR, Docker Hub, and Quay are all required channels: the release fails
  # early when any of them cannot be used.
  publish-images:
    runs-on: ubuntu-latest
    needs: [test, rulepack, build-and-sbom, validate-release]
    if: needs.validate-release.outputs.mode != ''
    environment: release-images
    permissions:
      contents: write  # attach the per-platform SBOMs to the GitHub release
      packages: write
      id-token: write  # keyless cosign signing via Sigstore OIDC
    outputs:
      digest: ${{ steps.canonical.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Pipeline code (scripts and gates) comes from this run's own commit; the
      # release source being built is checked out separately at the release
      # tag. In release mode both are the same commit; in a resume run the
      # pipeline is the current branch and the source is the exact released
      # tag, so a corrected pipeline can republish unchanged release bytes.
      - name: Check out the release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.validate-release.outputs.source_sha }}
          path: release-src

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      # The canonical release image must come from the hardened base, so a
      # failed DHI login fails the release here.
      - name: Login to DHI registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_REGISTRY_USERNAME }}
          password: ${{ secrets.DHI_REGISTRY_TOKEN }}

      # The Docker Hub destination is pinned to the exact published
      # repository, so a changed or mistyped variable can never publish or
      # sign a different destination.
      - name: Validate release registry configuration
        run: |
          if [ "${{ vars.DOCKERHUB_IMAGE }}" != "craevidence/cli" ]; then
            echo "::error::vars.DOCKERHUB_IMAGE must be 'craevidence/cli', got '${{ vars.DOCKERHUB_IMAGE }}'"
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          username: craevidence
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Quay.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: quay.io
          username: craevidence+all
          password: ${{ secrets.QUAY_TOKEN }}

      # Digest resolution and cross-registry copies use a pinned crane so the
      # registry read/copy behaviour is identical on every run.
      - name: Install crane
        run: |
          bash scripts/install-crane.sh "${RUNNER_TEMP}/bin"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      # Published releases are immutable: when the GHCR version tag already
      # exists (a rerun after a partial failure), its digest is reused and
      # nothing is rebuilt, so a rerun can never replace released bytes. Only
      # a definitive not-found response counts as an absent tag; any other
      # inspection error fails the run instead of triggering a rebuild.
      - name: Resolve any existing release digest
        id: existing
        run: |
          set -euo pipefail
          repo="ghcr.io/${{ github.repository_owner }}/craevidence"
          version="${{ needs.validate-release.outputs.version }}"
          # A non-zero helper exit (unknown state after retries) fails the step
          # under set -e, so a transient registry error never triggers a rebuild.
          result="$(bash scripts/registry-crane.sh digest "${repo}:${version}")"
          case "${result}" in
            "FOUND "*)
              digest="${result#FOUND }"
              echo "${repo}:${version} already exists at ${digest}; reusing it, not rebuilding." ;;
            NOTFOUND)
              digest="" ;;
            *)
              echo "::error::unexpected registry-crane result: ${result}"; exit 1 ;;
          esac
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      # A rebuild needs a trusted source: a release event anchors it to the
      # event commit, and a resume anchors it to an immutable release. A
      # resume of a mutable release must not rebuild, because its tag gives
      # the build no trustworthy input; completing already-published
      # artifacts is unaffected.
      - name: Require a trusted source anchor for a rebuild
        if: steps.existing.outputs.digest == '' && needs.validate-release.outputs.build_allowed != 'true'
        run: |
          echo "::error::no canonical image exists for this version and the release has no trusted source anchor for a rebuild. Publish a new patch release."
          exit 1

      # A rebuild only happens when no digest exists yet, and it must build the
      # hardened release source: the strict base check runs against the release
      # tag's Dockerfile, not the pipeline checkout's.
      - name: Verify the release source pins the current hardened base
        if: steps.existing.outputs.digest == ''
        run: bash scripts/check-dhi-base.sh --strict release-src/Dockerfile

      # One canonical multi-arch build, pushed to GHCR, and only on the first
      # run for this version. Docker Hub and Quay receive exact copies of this
      # index by digest, so every registry serves the same content-addressed
      # artifact and one signature target exists. The build context is the
      # release source checkout.
      - name: Build and push the canonical multi-arch image to GHCR
        if: steps.existing.outputs.digest == ''
        id: build-ghcr
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: ./release-src
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/craevidence:${{ needs.validate-release.outputs.version }}

      - name: Select the canonical release digest
        id: canonical
        run: |
          set -euo pipefail
          digest="${{ steps.existing.outputs.digest }}"
          if [ -z "${digest}" ]; then
            digest="${{ steps.build-ghcr.outputs.digest }}"
          fi
          if [ -z "${digest}" ]; then
            echo "::error::no canonical release digest is available"
            exit 1
          fi
          echo "canonical release digest: ${digest}"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      # Keyless signing (Sigstore OIDC, no long-lived keys): installed before
      # any propagation so a reused digest can be authenticated first.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          cosign-release: "v3.1.2"

      # No run may propagate a digest merely because the mutable GHCR version
      # tag currently points at it: a reused digest must already carry a
      # signature under the exact release tag identity, which only the
      # legitimate release pipeline can create and which binds the signature
      # to this version. The identity accepted here is deliberately narrower
      # than elsewhere: a branch-identity signature is not version-bound, so
      # it does not authenticate a digest as THIS release. An unsigned
      # partial state requires a new patch release.
      - name: Require a reused digest to carry the release tag signature
        if: steps.existing.outputs.digest != ''
        env:
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        run: |
          set -euo pipefail
          digest="${{ steps.canonical.outputs.digest }}"
          repo="ghcr.io/${{ github.repository_owner }}/craevidence"
          tag_identity="https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/tags/${RELEASE_TAG}"
          if cosign verify \
              --certificate-identity "${tag_identity}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${repo}@${digest}" > /dev/null 2>&1; then
            echo "reused digest ${digest} carries the release tag signature"
          else
            echo "::error::reused digest ${digest} carries no signature under the exact release tag identity; the version tag cannot be trusted. Publish a new patch release."
            exit 1
          fi

      # Only a definitive not-found response allows a copy; any other
      # inspection error fails the run so a transient registry failure can
      # never lead to overwriting an existing version tag.
      - name: Copy the release index to registries that do not have it yet
        run: |
          set -euo pipefail
          digest="${{ steps.canonical.outputs.digest }}"
          src="ghcr.io/${{ github.repository_owner }}/craevidence@${digest}"
          version="${{ needs.validate-release.outputs.version }}"
          for dst in \
            "${{ vars.DOCKERHUB_IMAGE }}" \
            "quay.io/craevidence/cli"; do
            result="$(bash scripts/registry-crane.sh digest "${dst}:${version}")"
            case "${result}" in
              "FOUND "*)
                existing="${result#FOUND }"
                if [ "${existing}" != "${digest}" ]; then
                  echo "::error::${dst}:${version} already exists at ${existing}, which differs from the canonical ${digest}; refusing to overwrite a published release"
                  exit 1
                fi
                echo "${dst}:${version} already matches the canonical digest" ;;
              NOTFOUND)
                crane copy "${src}" "${dst}:${version}" ;;
              *)
                echo "::error::unexpected registry-crane result: ${result}"; exit 1 ;;
            esac
          done

      - name: Require every version tag to resolve to the canonical digest
        run: |
          set -euo pipefail
          digest="${{ steps.canonical.outputs.digest }}"
          for ref in \
            "ghcr.io/${{ github.repository_owner }}/craevidence:${{ needs.validate-release.outputs.version }}" \
            "${{ vars.DOCKERHUB_IMAGE }}:${{ needs.validate-release.outputs.version }}" \
            "quay.io/craevidence/cli:${{ needs.validate-release.outputs.version }}"; do
            result="$(bash scripts/registry-crane.sh digest "${ref}")"
            resolved="${result#FOUND }"
            if [ "${result%% *}" != "FOUND" ] || [ "${resolved}" != "${digest}" ]; then
              echo "::error::${ref} resolved to '${result}', expected FOUND ${digest}"
              exit 1
            fi
            echo "verified ${ref} -> ${resolved}"
          done

      # Two exact identities are accepted, never a pattern: the release tag
      # identity (signatures from the original release run) and this run's
      # identity (signatures a resume run creates; in release mode both
      # strings are the same). Idempotence is verification-first, which works
      # for both signature storage formats: the legacy per-digest .sig tag
      # (cosign 2.x) and the bundle-format referring artifact (cosign 3.x).
      # A digest that already verifies is not re-signed. When nothing
      # verifies, a legacy signature object that still exists belongs to
      # nobody we accept and fails the run for investigation; otherwise the
      # digest is signed (a transport failure in the probe also fails, never
      # a blind re-sign).
      - name: Sign the release digest on every registry
        env:
          COSIGN_YES: "true"
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        run: |
          set -euo pipefail
          digest="${{ steps.canonical.outputs.digest }}"
          tag_identity="https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/tags/${RELEASE_TAG}"
          run_identity="https://github.com/${{ github.repository }}/.github/workflows/ci.yml@${{ github.ref }}"
          for repo in \
            "ghcr.io/${{ github.repository_owner }}/craevidence" \
            "${{ vars.DOCKERHUB_IMAGE }}" \
            "quay.io/craevidence/cli"; do
            verified=""
            for identity in "${tag_identity}" "${run_identity}"; do
              if cosign verify \
                  --certificate-identity "${identity}" \
                  --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
                  "${repo}@${digest}" > /dev/null 2>&1; then
                verified="${identity}"
                break
              fi
            done
            if [ -n "${verified}" ]; then
              echo "${repo}@${digest} already carries an accepted signature (${verified}); not re-signing"
              continue
            fi
            sig_state="$(bash scripts/registry-crane.sh digest "${repo}:${digest//:/-}.sig")"
            if [ "${sig_state}" != "NOTFOUND" ]; then
              echo "::error::${repo}@${digest} carries a legacy signature object that matches neither accepted identity; refusing to sign over it"
              exit 1
            fi
            cosign sign --yes "${repo}@${digest}"
          done

      - name: Verify every signature with an accepted release identity
        env:
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        run: |
          set -euo pipefail
          digest="${{ steps.canonical.outputs.digest }}"
          tag_identity="https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/tags/${RELEASE_TAG}"
          run_identity="https://github.com/${{ github.repository }}/.github/workflows/ci.yml@${{ github.ref }}"
          for repo in \
            "ghcr.io/${{ github.repository_owner }}/craevidence" \
            "${{ vars.DOCKERHUB_IMAGE }}" \
            "quay.io/craevidence/cli"; do
            verified=""
            for identity in "${tag_identity}" "${run_identity}"; do
              if cosign verify \
                  --certificate-identity "${identity}" \
                  --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
                  "${repo}@${digest}" > /dev/null 2>&1; then
                verified="${identity}"
                break
              fi
            done
            if [ -z "${verified}" ]; then
              echo "::error::${repo}@${digest} carries no signature matching either accepted identity"
              exit 1
            fi
            echo "verified signature on ${repo}@${digest} (${verified})"
          done

      # The published SBOMs describe the canonical released digests, one per
      # platform, never a separate local build.
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0

      - name: Generate digest-bound per-platform SBOMs
        run: |
          set -euo pipefail
          digest="${{ steps.canonical.outputs.digest }}"
          version="${{ needs.validate-release.outputs.version }}"
          repo="ghcr.io/${{ github.repository_owner }}/craevidence"
          bash scripts/registry-crane.sh raw "${repo}@${digest}" > release-index.json
          for arch in amd64 arm64; do
            platform_digest="$(jq -r --arg arch "${arch}" \
              '.manifests[] | select(.platform.os == "linux" and .platform.architecture == $arch) | .digest' \
              release-index.json)"
            if [ -z "${platform_digest}" ] || [ "${platform_digest}" = "null" ]; then
              echo "::error::no linux/${arch} manifest found in the release index"
              exit 1
            fi
            syft "registry:${repo}@${platform_digest}" \
              --exclude '/var/lib/dpkg/status.d/**' \
              -o "cyclonedx-json=sbom-${version}-linux-${arch}.cdx.json"
            echo "generated sbom-${version}-linux-${arch}.cdx.json from ${platform_digest} (index ${digest})"
          done

      # SBOM assets are published security evidence, so a mutable release
      # asset is trusted only through its signed bundle. A retained SBOM whose
      # bundle verifies under an accepted identity is kept; a retained SBOM
      # whose bundle verification FAILS is tampered evidence and stops the
      # run; an SBOM without a complete signed pair (including all assets
      # published before bundles existed) is replaced by the freshly
      # generated, freshly signed document, which describes the same
      # authenticated digest. SBOM bytes are not deterministic across
      # generations, which is why authenticated retained copies are kept
      # rather than compared.
      - name: Attach authenticated per-platform SBOMs to the GitHub release
        env:
          COSIGN_YES: "true"
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        run: |
          set -euo pipefail
          tag_identity="https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/tags/${RELEASE_TAG}"
          run_identity="https://github.com/${{ github.repository }}/.github/workflows/ci.yml@${{ github.ref }}"
          bash scripts/reconcile_release_sboms.sh \
            "${RELEASE_TAG}" "${tag_identity}" "${run_identity}" sbom-assets \
            sbom-*.cdx.json

      # The SBOMs the release actually SERVES are validated, not the local
      # generations: both authenticated assets must be well-formed CycloneDX
      # 1.6 documents whose subject is the canonical image at the matching
      # platform digest.
      - name: Validate the published SBOM assets
        run: |
          set -euo pipefail
          version="${{ needs.validate-release.outputs.version }}"
          repo="ghcr.io/${{ github.repository_owner }}/craevidence"
          digest_amd64="$(jq -r '.manifests[] | select(.platform.os == "linux" and .platform.architecture == "amd64") | .digest' release-index.json)"
          digest_arm64="$(jq -r '.manifests[] | select(.platform.os == "linux" and .platform.architecture == "arm64") | .digest' release-index.json)"
          python scripts/validate_release_sboms.py \
            --version "${version}" \
            --image "${repo}" \
            --digest-amd64 "${digest_amd64}" \
            --digest-arm64 "${digest_arm64}" \
            --dir sbom-assets

      # Dogfooding is a release dependency: every release run submits the
      # PUBLISHED amd64 SBOM bytes to CRA Evidence. The submitted file comes
      # from the working set whose every document was verified against its
      # signed bundle by the reconciliation step, so a rerun after any partial
      # failure still completes the evidence upload with trusted bytes.
      - name: Upload the release SBOM to CRA Evidence
        env:
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
          CRA_EVIDENCE_API_KEY: ${{ secrets.CRA_EVIDENCE_API_KEY }}
          CRA_EVIDENCE_URL: https://api.craevidence.com
        run: |
          set -euo pipefail
          version="${{ needs.validate-release.outputs.version }}"
          asset="sbom-${version}-linux-amd64.cdx.json"
          mkdir -p published-evidence
          cp "sbom-assets/${asset}" published-evidence/
          amd64_digest="$(jq -r '.manifests[] | select(.platform.os == "linux" and .platform.architecture == "amd64") | .digest' release-index.json)"
          if ! jq -e --arg d "${amd64_digest}" --arg r "ghcr.io/${{ github.repository_owner }}/craevidence" \
              '.metadata.component.version == $d and .metadata.component.name == $r' \
              "published-evidence/${asset}" > /dev/null; then
            echo "::error::published ${asset} does not have the canonical amd64 digest as its SBOM subject"
            exit 1
          fi
          docker run --rm \
            -v "${{ github.workspace }}/published-evidence:/workspace" \
            -e CRA_EVIDENCE_API_KEY \
            -e CRA_EVIDENCE_URL \
            "ghcr.io/${{ github.repository_owner }}/craevidence@${{ steps.canonical.outputs.digest }}" \
            upload-sbom \
              --product cra-evidence-cli \
              --component cli \
              --version "${version}" \
              --file "/workspace/${asset}" \
              --no-create-product \
              --create-version \
              --scan

  # ---------------------------------------------------------------------------
  # Job 6: Publish to PyPI (on release)
  # ---------------------------------------------------------------------------
  # Publishes the sdist and wheel to PyPI via Trusted Publishing (OIDC, no API
  # token) and attaches PEP 740 Sigstore attestations to each artifact.
  #
  # Prerequisites (one-time, configured outside this file):
  #   - Register the `craevidence` project on PyPI.
  #   - Add this repository + the `pypi` environment as a Trusted Publisher in
  #     the PyPI project settings.
  # ---------------------------------------------------------------------------
  publish-pypi:
    runs-on: ubuntu-latest
    needs: [test, rulepack, build-and-sbom, validate-release, publish-images]
    if: needs.validate-release.outputs.mode != ''
    environment: pypi
    permissions:
      contents: write  # upload signed artifacts to the GitHub release
      id-token: write  # OIDC for Trusted Publishing, PEP 740 attestations, Sigstore signing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Pipeline code comes from this run's own commit; the release source
      # being packaged is checked out separately at the release tag, so a
      # resume run publishes the released bytes, never the current branch's.
      - name: Check out the release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.validate-release.outputs.source_sha }}
          path: release-src

      # Refuse to publish artifacts whose metadata version does not match the
      # release tag. PyPI uploads are immutable, so a v3.6.0 release must carry
      # exactly version 3.6.0. The check reads the release source, which is
      # what gets packaged.
      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        run: |
          VERSION=$(grep '^version' release-src/pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "${RELEASE_TAG}" != "v${VERSION}" ]; then
            echo "::error::Release tag '${RELEASE_TAG}' does not match package version 'v${VERSION}'"
            exit 1
          fi
          echo "Release tag '${RELEASE_TAG}' matches package version 'v${VERSION}'."

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.14"

      - name: Install packaging tools
        run: python -m pip install pip==26.1.2 build==1.5.0 sigstore==4.4.0

      # Acquire the canonical bytes for both distributions and decide per file
      # whether it still needs publishing. PyPI is immutable, so a file already
      # served there is canonical and is downloaded, never rebuilt; a file
      # checkpointed as a release asset is reused; only files available nowhere
      # are built from the release source. This makes a rerun after any partial
      # failure deterministic.
      - name: Prepare the release distributions
        id: dist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Building fresh bytes needs a trusted source anchor: a release
          # event, or an immutable release on resume. Without one, only
          # already-published or checkpointed bytes may be used.
          flags=()
          if [ "${{ needs.validate-release.outputs.build_allowed }}" != "true" ]; then
            flags+=(--no-build)
          fi
          python scripts/prepare_release_dist.py \
            --version "${{ needs.validate-release.outputs.version }}" \
            --tag "${{ needs.validate-release.outputs.tag }}" \
            --release-src release-src \
            --dist-dir dist \
            "${flags[@]}"

      # No run may publish checkpointed bytes merely because a release asset
      # with the right name exists: release assets are mutable, so each
      # distribution taken from an asset must verify against its checkpointed
      # Sigstore bundle under one of the two exact accepted identities, which
      # only a legitimate pipeline run can create (checkpoints written by a
      # resume run legitimately carry the branch identity; the wheel binding
      # and PyPI's own metadata validation pin the version). Without that
      # anchor the run fails and a new patch release is the correction.
      - name: Require checkpointed distributions to verify against their signed bundles
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
          WHEEL_SOURCE: ${{ steps.dist.outputs.wheel_source }}
          SDIST_SOURCE: ${{ steps.dist.outputs.sdist_source }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          tag_identity="https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/tags/${RELEASE_TAG}"
          run_identity="https://github.com/${{ github.repository }}/.github/workflows/ci.yml@${{ github.ref }}"
          mkdir -p anchor-bundles
          check_asset() {
            local file="$1" bundle="$1.sigstore.json" identity
            gh release download "${RELEASE_TAG}" --pattern "${bundle}" --dir anchor-bundles || {
              echo "::error::${file} came from a release asset but ${bundle} is not attached; the bytes cannot be authenticated. Publish a new release."
              exit 1
            }
            for identity in "${tag_identity}" "${run_identity}"; do
              if python -m sigstore verify identity \
                  --bundle "anchor-bundles/${bundle}" \
                  --cert-identity "${identity}" \
                  --cert-oidc-issuer "https://token.actions.githubusercontent.com" \
                  "dist/${file}" > /dev/null 2>&1; then
                echo "${file} verifies against its checkpointed bundle (${identity})"
                return 0
              fi
            done
            echo "::error::${file} does not verify against its checkpointed bundle under either accepted identity. Publish a new release."
            exit 1
          }
          if [ "${WHEEL_SOURCE}" = "release-asset" ]; then
            check_asset "craevidence-${version}-py3-none-any.whl"
          fi
          if [ "${SDIST_SOURCE}" = "release-asset" ]; then
            check_asset "craevidence-${version}.tar.gz"
          fi
          echo "checkpointed distribution anchors verified"

      # The GitLab component ships with a pinned wheel version and checksum;
      # they must describe exactly the wheel this release serves. The pin is
      # read from the release source, which is what published the component.
      - name: Require the wheel to match the component pin
        run: |
          set -euo pipefail
          wheel=$(ls dist/*.whl)
          actual=$(sha256sum "${wheel}" | awk '{print $1}')
          version=$(basename "${wheel}" | sed 's/craevidence-\(.*\)-py3-none-any\.whl/\1/')
          pinned_version=$(grep -oE 'CLI_VERSION="[0-9.]+"' release-src/gitlab-ci-component.yml | head -1 | cut -d'"' -f2)
          pinned_hash=$(grep -oE 'CLI_WHEEL_SHA256="[a-f0-9]{64}"' release-src/gitlab-ci-component.yml | head -1 | cut -d'"' -f2)
          if [ "${pinned_version}" != "${version}" ] || [ "${pinned_hash}" != "${actual}" ]; then
            echo "::error::gitlab-ci-component.yml pins ${pinned_version} ${pinned_hash}, but the wheel is ${version} ${actual}"
            exit 1
          fi
          echo "component pin matches the wheel"

      # Sign before any publication so a signing failure stops the job while
      # the release is still fully reversible; the PyPI upload below is
      # immutable. The same artifacts are published to PyPI and attached to
      # the GitHub release with their Sigstore bundles.
      - name: Sign artifacts with Sigstore
        run: |
          python -m sigstore sign dist/*.tar.gz dist/*.whl
          # Keep dist/ distribution-only for the PyPI upload steps.
          mkdir -p sigstore-bundles
          mv dist/*.sigstore.json sigstore-bundles/

      # Checkpoint BEFORE publishing: the exact bytes that will be uploaded to
      # PyPI are attached to the GitHub release first, so a failure at any
      # later point leaves a rerun the canonical bytes to resume from (the
      # sdist cannot be rebuilt identically). Sigstore bundles are not
      # deterministic across runs, so assets already attached are kept, but
      # never blindly: a retained distribution must match the local canonical
      # bytes, and a retained bundle must verify against those bytes with one
      # of the two exact accepted identities: the release tag identity (assets
      # from the original release run) or this run's identity (assets from a
      # resume run). Never a pattern.
      - name: Checkpoint signed artifacts on the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        run: |
          set -euo pipefail
          tag_identity="https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/tags/${RELEASE_TAG}"
          run_identity="https://github.com/${{ github.repository }}/.github/workflows/ci.yml@${{ github.ref }}"
          existing="$(gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name')"
          mkdir -p retained-assets
          for f in dist/* sigstore-bundles/*; do
            name="$(basename "${f}")"
            if ! grep -Fqx -- "${name}" <<< "${existing}"; then
              gh release upload "${RELEASE_TAG}" "${f}"
              continue
            fi
            gh release download "${RELEASE_TAG}" --pattern "${name}" --dir retained-assets --clobber
            case "${name}" in
              *.sigstore.json)
                subject="dist/$(basename "${name}" .sigstore.json)"
                verified=""
                for identity in "${tag_identity}" "${run_identity}"; do
                  if python -m sigstore verify identity \
                      --bundle "retained-assets/${name}" \
                      --cert-identity "${identity}" \
                      --cert-oidc-issuer "https://token.actions.githubusercontent.com" \
                      "${subject}"; then
                    verified="${identity}"
                    break
                  fi
                done
                if [ -z "${verified}" ]; then
                  echo "::error::retained release asset ${name} does not verify against ${subject} with either accepted identity"
                  exit 1
                fi
                echo "${name} is already attached and verifies (${verified}); keeping the published copy"
                ;;
              *)
                if ! cmp -s "retained-assets/${name}" "${f}"; then
                  echo "::error::retained release asset ${name} differs from the canonical bytes"
                  exit 1
                fi
                echo "${name} is already attached and matches; keeping the published copy"
                ;;
            esac
          done

      # Publishing is per file: each still-missing distribution is uploaded on
      # its own from a directory containing only that file, so a failure
      # between the two uploads leaves a state the next resume run completes.
      # skip-existing is not set: a file that appeared on PyPI since the
      # prepare step means a raced writer, and the duplicate upload must fail
      # loudly rather than be masked.
      - name: Split distributions for per-file publishing
        if: steps.dist.outputs.wheel_publish == 'true' || steps.dist.outputs.sdist_publish == 'true'
        run: |
          set -euo pipefail
          mkdir -p publish-wheel publish-sdist
          cp dist/*.whl publish-wheel/
          cp dist/*.tar.gz publish-sdist/

      - name: Publish the wheel to PyPI
        if: steps.dist.outputs.wheel_publish == 'true'
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # release/v1
        with:
          packages-dir: publish-wheel/
          attestations: true

      - name: Publish the sdist to PyPI
        if: steps.dist.outputs.sdist_publish == 'true'
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # release/v1
        with:
          packages-dir: publish-sdist/
          attestations: true

      # The publish action leaves a PEP 740 attestation sidecar next to each
      # file it uploaded. Sidecars from THIS run are collected; a sidecar
      # whose run died between the PyPI upload and this attachment is
      # recovered from the accepted provenance PyPI serves, so no successful
      # upload can lose its evidence. Already-attached sidecars stay. The
      # verification step below proves every attached sidecar is an
      # attestation PyPI actually accepted.
      - name: Attach the PyPI attestations to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        run: |
          set -euo pipefail
          existing="$(gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name')"
          mkdir -p attestation-assets
          shopt -s nullglob
          for f in publish-wheel/*.publish.attestation publish-sdist/*.publish.attestation; do
            cp "${f}" attestation-assets/
          done
          # Attached sidecars count as present; only genuinely absent ones
          # are recovered from PyPI provenance.
          for name in \
            "craevidence-${RELEASE_TAG#v}-py3-none-any.whl.publish.attestation" \
            "craevidence-${RELEASE_TAG#v}.tar.gz.publish.attestation"; do
            if grep -Fqx -- "${name}" <<< "${existing}" && [ ! -f "attestation-assets/${name}" ]; then
              gh release download "${RELEASE_TAG}" --pattern "${name}" --dir attestation-assets
            fi
          done
          python scripts/recover_pypi_attestations.py \
            --version "${RELEASE_TAG#v}" \
            --dir attestation-assets
          for f in attestation-assets/*.publish.attestation; do
            name="$(basename "${f}")"
            if grep -Fqx -- "${name}" <<< "${existing}"; then
              echo "${name} is already attached to the release; keeping the published copy"
            else
              gh release upload "${RELEASE_TAG}" "${f}"
            fi
          done

      # Post-publish check: PyPI must serve exactly the two expected
      # distributions with sha256 matching the local build and Trusted
      # Publishing provenance bound to this repository, and the release's
      # attestation assets must be attestations PyPI actually accepted, not
      # arbitrary bytes under the right names.
      - name: Verify PyPI serves the published artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        run: |
          set -euo pipefail
          # A fresh directory, distinct from the attachment step's working
          # set, so the verifier sees exactly the sidecars the release
          # serves and the download never collides with local copies.
          mkdir -p verify-attestation-assets
          gh release download "${RELEASE_TAG}" --pattern '*.publish.attestation' --dir verify-attestation-assets --clobber
          python scripts/verify_pypi_release.py --attestations-dir verify-attestation-assets

  # ---------------------------------------------------------------------------
  # Job 7: Finalize the release (on release)
  # ---------------------------------------------------------------------------
  # latest moves only after BOTH the container channels and PyPI have
  # succeeded, so the default tag can never point at a partially released
  # version. The canonical digest is carried from publish-images as a job
  # output (not re-resolved by tag), and every version tag is confirmed to
  # equal it before any latest tag is moved.
  finalize-release:
    runs-on: ubuntu-latest
    needs: [validate-release, publish-images, publish-pypi]
    if: needs.validate-release.outputs.mode != ''
    environment: release-images
    permissions:
      contents: read  # read the newest-release state before moving latest
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # latest only ever moves forward: whatever the mode, the tag being
      # published must be the newest stable release at the moment of
      # promotion, so neither a resume of an older release nor a release
      # marked not-latest can roll the latest tags backward.
      - name: Require this tag to be the newest stable release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
        run: |
          set -euo pipefail
          # Bounded retries absorb a just-published release not yet reflected
          # by the API; a persistent mismatch still refuses the move.
          for attempt in 1 2 3 4 5 6; do
            newest="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)"
            if [ "${newest}" = "${RELEASE_TAG}" ]; then
              echo "'${RELEASE_TAG}' is the newest stable release; latest may move"
              exit 0
            fi
            if [ "${attempt}" -lt 6 ]; then
              echo "newest stable release is '${newest}' (attempt ${attempt}/6); retrying"
              sleep 10
            fi
          done
          echo "::error::'${RELEASE_TAG}' is not the newest stable release ('${newest}'); refusing to move latest"
          exit 1

      # crane moves the latest tags by digest; no image build happens here, so
      # buildx is not needed.
      - name: Install crane
        run: |
          bash scripts/install-crane.sh "${RUNNER_TEMP}/bin"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          username: craevidence
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Quay.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: quay.io
          username: craevidence+all
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Move the latest tags to the canonical release digest
        run: |
          set -euo pipefail
          version="${{ needs.validate-release.outputs.version }}"
          digest="${{ needs.publish-images.outputs.digest }}"
          if ! printf '%s' "${digest}" | grep -qE '^sha256:[0-9a-f]{64}$'; then
            echo "::error::publish-images did not provide a valid canonical digest: '${digest}'"
            exit 1
          fi
          repo="ghcr.io/${{ github.repository_owner }}/craevidence"
          src="${repo}@${digest}"
          # Confirm every published version tag still equals the canonical
          # digest before promoting latest, so latest can never point at a
          # digest that drifted from the release.
          for ref in \
            "${repo}:${version}" \
            "${{ vars.DOCKERHUB_IMAGE }}:${version}" \
            "quay.io/craevidence/cli:${version}"; do
            result="$(bash scripts/registry-crane.sh digest "${ref}")"
            resolved="${result#FOUND }"
            if [ "${result%% *}" != "FOUND" ] || [ "${resolved}" != "${digest}" ]; then
              echo "::error::${ref} resolved to '${result}', expected FOUND ${digest}; refusing to move latest"
              exit 1
            fi
          done
          latest_tags=( \
            "${repo}:latest" \
            "${{ vars.DOCKERHUB_IMAGE }}:latest" \
            "quay.io/craevidence/cli:latest" )
          for dst in "${latest_tags[@]}"; do
            crane copy "${src}" "${dst}"
          done
          # Confirm every latest tag now resolves to the canonical digest, so a
          # partial promotion cannot be reported as success. A rerun re-creates
          # the same digest idempotently.
          for dst in "${latest_tags[@]}"; do
            result="$(bash scripts/registry-crane.sh digest "${dst}")"
            resolved="${result#FOUND }"
            if [ "${result%% *}" != "FOUND" ] || [ "${resolved}" != "${digest}" ]; then
              echo "::error::${dst} resolved to '${result}' after promotion, expected FOUND ${digest}"
              exit 1
            fi
            echo "promoted ${dst} -> ${resolved}"
          done
