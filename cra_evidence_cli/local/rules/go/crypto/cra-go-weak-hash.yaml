rules:
  - id: cra-go-weak-hash
    message: >
      MD5 or SHA-1 is used. Both are considered cryptographically broken and
      must not be used for security purposes such as signatures, MACs, or
      password hashing. Use SHA-256 or stronger (crypto/sha256, crypto/sha512).
    severity: WARNING
    metadata:
      cwe:
        - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      owasp:
        - "A02:2021 - Cryptographic Failures"
      references:
        - https://cwe.mitre.org/data/definitions/327.html
        - https://owasp.org/Top10/A02_2021-Cryptographic_Failures/
      category: security
      technology:
        - go
      confidence: MEDIUM
      license: MIT
      author: CRA Evidence
    languages: [go]
    pattern-either:
      - pattern: md5.New()
      - pattern: md5.Sum(...)
      - pattern: sha1.New()
      - pattern: sha1.Sum(...)
