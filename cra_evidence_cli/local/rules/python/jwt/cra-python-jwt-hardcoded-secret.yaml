rules:
  - id: cra-python-jwt-hardcoded-secret
    message: >
      The signing key passed to this JWT call is a hardcoded string literal. Anyone with
      access to the source can read the secret and forge or decode tokens. Load the
      signing secret from an environment variable or a secrets manager instead of
      embedding it in source. This may also fire on literal test secrets, which are
      benign.
    severity: WARNING
    languages: [python]
    metadata:
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      references:
        - https://pyjwt.readthedocs.io/en/stable/usage.html
        - https://cwe.mitre.org/data/definitions/798.html
        - https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures/
      category: security
      technology:
        - python
        - jwt
      confidence: MEDIUM
      license: MIT
      author: CRA Evidence
    patterns:
      - pattern-either:
          - pattern: jwt.encode($PAYLOAD, $KEY, ...)
          - pattern: jwt.encode($PAYLOAD, key=$KEY, ...)
          - pattern: jwt.decode($TOKEN, $KEY, ...)
          - pattern: jwt.decode($TOKEN, key=$KEY, ...)
          - pattern: jose.jwt.encode($PAYLOAD, $KEY, ...)
          - pattern: jose.jwt.encode($PAYLOAD, key=$KEY, ...)
          - pattern: jose.jwt.decode($TOKEN, $KEY, ...)
          - pattern: jose.jwt.decode($TOKEN, key=$KEY, ...)
      - metavariable-regex:
          metavariable: $KEY
          regex: ^(["'])\S{8,}\1$
      - focus-metavariable: $KEY
