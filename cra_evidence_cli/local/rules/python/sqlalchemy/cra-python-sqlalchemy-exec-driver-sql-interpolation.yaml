rules:
  - id: cra-python-sqlalchemy-exec-driver-sql-interpolation
    message: >
      SQLAlchemy exec_driver_sql() called with an interpolated string (f-string,
      str.format, %-format, or concatenation). This method sends the string
      straight to the DBAPI driver with no bound-parameter processing, so
      interpolation here can allow SQL injection. Pass values as the parameters
      exec_driver_sql() accepts using driver placeholders, or validate identifiers
      such as table names against a fixed allowlist before interpolating.
    severity: ERROR
    languages: [python]
    metadata:
      cwe:
        - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      owasp:
        - "A03:2021 - Injection"
      references:
        - https://docs.sqlalchemy.org/en/20/core/connections.html
        - https://cwe.mitre.org/data/definitions/89.html
        - https://owasp.org/Top10/A03_2021-Injection/
      category: security
      technology:
        - python
        - sqlalchemy
      confidence: HIGH
      license: MIT
      author: CRA Evidence
    patterns:
      - pattern-either:
          - pattern: $CONN.exec_driver_sql(f"...{$X}...", ...)
          - pattern: $CONN.exec_driver_sql("...".format(...), ...)
          - pattern: $CONN.exec_driver_sql("..." % $X, ...)
          - pattern: $CONN.exec_driver_sql("..." + $X, ...)
          - pattern: $CONN.exec_driver_sql($X + "...", ...)
      - pattern-not: $CONN.exec_driver_sql("..." + "...", ...)
