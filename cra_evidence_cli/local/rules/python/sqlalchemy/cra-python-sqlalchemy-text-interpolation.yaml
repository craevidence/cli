rules:
  - id: cra-python-sqlalchemy-text-interpolation
    message: >
      SQLAlchemy text() built from an interpolated string (f-string, str.format,
      %-format, or concatenation). text() renders its argument as raw SQL, so
      embedding values this way can allow SQL injection. Use a static text() string
      with bound :parameters and pass values through the execute() parameter dict.
    severity: WARNING
    languages: [python]
    metadata:
      cwe:
        - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      owasp:
        - "A03:2021 - Injection"
      references:
        - https://docs.sqlalchemy.org/en/20/core/connections.html
        - https://cwe.mitre.org/data/definitions/89.html
        - https://owasp.org/Top10/A03_2021-Injection/
      category: security
      technology:
        - python
        - sqlalchemy
      confidence: MEDIUM
      license: MIT
      author: CRA Evidence
    patterns:
      - pattern-either:
          - pattern: text(f"...{$X}...")
          - pattern: text("...".format(...))
          - pattern: text("..." % $X)
          - pattern: text("..." + $X)
          - pattern: text($X + "...")
          - pattern: sqlalchemy.text(f"...{$X}...")
          - pattern: sqlalchemy.text("...".format(...))
          - pattern: sqlalchemy.text("..." % $X)
          - pattern: sqlalchemy.text("..." + $X)
          - pattern: sqlalchemy.text($X + "...")
      - pattern-not: text("..." + "...")
      - pattern-not: sqlalchemy.text("..." + "...")
