rules:
  - id: cra-python-flask-plaintext-password-compare
    mode: taint
    message: >
      A request-supplied password is compared with == or != instead of a
      verification helper. This can indicate a plaintext or non-constant-time
      credential check. Store only password hashes and verify with
      werkzeug.security.check_password_hash, or use hmac.compare_digest, so the
      submitted password is never compared directly in plaintext.
    severity: WARNING
    languages: [python]
    metadata:
      cwe:
        - "CWE-256: Plaintext Storage of a Password"
      owasp:
        - "A02:2021 - Cryptographic Failures"
      references:
        - https://werkzeug.palletsprojects.com/en/stable/utils/
        - https://cwe.mitre.org/data/definitions/256.html
        - https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html
      category: security
      technology:
        - python
        - flask
      confidence: MEDIUM
      license: MIT
      author: CRA Evidence
    pattern-sources:
      - patterns:
          - pattern-either:
              - pattern: request.form[$K]
              - pattern: request.form.get($K)
              - pattern: request.values[$K]
              - pattern: request.values.get($K)
              - pattern: request.json[$K]
              - pattern: request.get_json()[$K]
          - metavariable-regex:
              metavariable: $K
              regex: (?i)^["'](password|passwd|pwd)["']$
    pattern-sanitizers:
      - pattern: check_password_hash(...)
      - pattern: werkzeug.security.check_password_hash(...)
      - pattern: hmac.compare_digest(...)
      - pattern: compare_digest(...)
      - pattern: bcrypt.checkpw(...)
      - pattern: checkpw(...)
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: $STORED == $PW
              - pattern: $PW == $STORED
              - pattern: $STORED != $PW
              - pattern: $PW != $STORED
          - focus-metavariable: $PW
          # The compared-against operand must be a stored value (an attribute or
          # subscript such as user.password or row["password"]), not another
          # request-supplied value, so a signup confirmation check
          # (password == password_confirmation) is not flagged.
          - metavariable-pattern:
              metavariable: $STORED
              patterns:
                - pattern-either:
                    - pattern: $OBJ.$ATTR
                    - pattern: $OBJ[$KEY]
                - pattern-not: request.$ATTR
                - pattern-not: request.$ANY[$KEY]
                - pattern-not: request.$ANY.get(...)
                - pattern-not: request.$ANY.get(...)[$KEY]
