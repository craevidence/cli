rules:
  - id: cra-python-flask-cors-wildcard-credentials
    message: >
      flask-cors is configured with an all-origins policy together with
      supports_credentials=True. This is a permissive cross-origin configuration:
      allowing any origin while enabling credentials can let any site read
      authenticated responses. Current flask-cors sends no Access-Control-Allow-Origin
      header for a literal "*" with credentials (the combination is spec-forbidden),
      but a regex that matches any origin reflects the caller's origin and is
      exploitable. When credentials are enabled, restrict origins to an explicit
      allowlist of trusted domains.
    severity: WARNING
    languages: [python]
    metadata:
      cwe:
        - "CWE-942: Permissive Cross-domain Policy with Untrusted Domains"
      owasp:
        - "A05:2021 - Security Misconfiguration"
      references:
        - https://flask-cors.readthedocs.io/en/latest/
        - https://cwe.mitre.org/data/definitions/942.html
        - https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS
      category: security
      technology:
        - python
        - flask
      confidence: MEDIUM
      license: MIT
      author: CRA Evidence
    patterns:
      - pattern-either:
          - pattern: CORS(..., supports_credentials=True, ...)
          - pattern: cross_origin(..., supports_credentials=True, ...)
      - pattern-either:
          - pattern: $F(..., origins="*", ...)
          - pattern: $F(..., origins=['*'], ...)
          - pattern: $F(..., origins=".*", ...)
          - pattern: $F(..., origins=['.*'], ...)
          - pattern: $F(..., origins=re.compile(".*"), ...)
