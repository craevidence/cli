rules:
  - id: cra-python-flask-session-cookie-insecure-false
    message: >
      SESSION_COOKIE_SECURE is explicitly set to False. Without the Secure attribute
      the session cookie can be transmitted over plaintext HTTP and captured by a
      network attacker. Set SESSION_COOKIE_SECURE to True in any deployment served
      over HTTPS so the session cookie is never sent over plaintext connections.
    severity: WARNING
    languages: [python]
    metadata:
      cwe:
        - "CWE-614: Sensitive Cookie in HTTPS Session Without 'Secure' Attribute"
      owasp:
        - "A05:2021 - Security Misconfiguration"
      references:
        - https://flask.palletsprojects.com/en/stable/config/
        - https://cwe.mitre.org/data/definitions/614.html
        - https://owasp.org/www-community/controls/SecureCookieAttribute
      category: security
      technology:
        - python
        - flask
      confidence: HIGH
      license: MIT
      author: CRA Evidence
    pattern-either:
      - patterns:
          - pattern: $APP.config['SESSION_COOKIE_SECURE'] = $VAL
          - metavariable-pattern:
              metavariable: $VAL
              pattern: "False"
          - focus-metavariable: $VAL
      - patterns:
          - pattern: $APP.config.update(..., SESSION_COOKIE_SECURE=$VAL, ...)
          - metavariable-pattern:
              metavariable: $VAL
              pattern: "False"
          - focus-metavariable: $VAL
