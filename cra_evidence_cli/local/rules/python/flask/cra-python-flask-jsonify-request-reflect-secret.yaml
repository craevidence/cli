rules:
  - id: cra-python-flask-jsonify-request-reflect-secret
    message: >
      jsonify() serializes an entire request header, cookie, environ, or config
      object back to the client. These mappings can carry Authorization headers,
      session cookies, or config secrets, so reflecting them whole may leak
      sensitive data. Return only the specific fields the client needs instead
      of the whole object.
    severity: INFO
    languages: [python]
    metadata:
      cwe:
        - "CWE-200: Exposure of Sensitive Information to an Unauthorized Actor"
      owasp:
        - "A01:2021 - Broken Access Control"
      references:
        - https://cwe.mitre.org/data/definitions/200.html
        - https://owasp.org/Top10/A01_2021-Broken_Access_Control/
        - https://flask.palletsprojects.com/en/stable/api/
      category: security
      technology:
        - python
        - flask
      confidence: LOW
      license: MIT
      author: CRA Evidence
    pattern-either:
      - pattern: jsonify($REQ.headers)
      - pattern: jsonify(dict($REQ.headers))
      - pattern: jsonify(**$REQ.headers)
      - pattern: jsonify($REQ.cookies)
      - pattern: jsonify(dict($REQ.cookies))
      - pattern: jsonify(**$REQ.cookies)
      - pattern: jsonify(request.environ)
      - pattern: jsonify(dict(request.environ))
      - pattern: jsonify(os.environ)
      - pattern: jsonify(dict(os.environ))
      - pattern: jsonify(**os.environ)
      - pattern: jsonify($APP.config)
      - pattern: jsonify(dict($APP.config))
      - pattern: jsonify(**$APP.config)
      - pattern: flask.jsonify($REQ.headers)
      - pattern: flask.jsonify(dict($REQ.headers))
      - pattern: flask.jsonify(**$REQ.headers)
      - pattern: flask.jsonify($REQ.cookies)
      - pattern: flask.jsonify(dict($REQ.cookies))
      - pattern: flask.jsonify(**$REQ.cookies)
      - pattern: flask.jsonify(request.environ)
      - pattern: flask.jsonify(dict(request.environ))
      - pattern: flask.jsonify(os.environ)
      - pattern: flask.jsonify(dict(os.environ))
      - pattern: flask.jsonify(**os.environ)
      - pattern: flask.jsonify($APP.config)
      - pattern: flask.jsonify(dict($APP.config))
      - pattern: flask.jsonify(**$APP.config)
