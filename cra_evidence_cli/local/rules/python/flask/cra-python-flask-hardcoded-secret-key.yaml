rules:
  - id: cra-python-flask-hardcoded-secret-key
    message: >
      A hardcoded string or bytes literal is assigned to the Flask SECRET_KEY. A
      committed secret key can allow session cookie forgery and other signed-token
      tampering. Load SECRET_KEY from an environment variable or a secret store at
      runtime rather than embedding a literal that ends up in version control.
    severity: ERROR
    languages: [python]
    metadata:
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - "A05:2021 - Security Misconfiguration"
      references:
        - https://flask.palletsprojects.com/en/stable/config/
        - https://cwe.mitre.org/data/definitions/798.html
        - https://owasp.org/Top10/A05_2021-Security_Misconfiguration/
      category: security
      technology:
        - python
        - flask
      confidence: HIGH
      license: MIT
      author: CRA Evidence
    pattern-either:
      - patterns:
          - pattern: $APP.config['SECRET_KEY'] = $VAL
          - metavariable-regex:
              metavariable: $VAL
              regex: ^([bBrRuU]|[bB][rR]|[rR][bB])?['"][^'"]*[^'"\s]
          - focus-metavariable: $VAL
      - patterns:
          - pattern: $APP.secret_key = $VAL
          - metavariable-regex:
              metavariable: $VAL
              regex: ^([bBrRuU]|[bB][rR]|[rR][bB])?['"][^'"]*[^'"\s]
          - focus-metavariable: $VAL
      - patterns:
          - pattern: $APP.config.update(..., SECRET_KEY=$VAL, ...)
          - metavariable-regex:
              metavariable: $VAL
              regex: ^([bBrRuU]|[bB][rR]|[rR][bB])?['"][^'"]*[^'"\s]
          - focus-metavariable: $VAL
