rules:
  - id: cra-python-django-hardcoded-secret-key
    message: >
      SECRET_KEY is assigned a hardcoded string literal in a Django settings module.
      A committed signing key can allow an attacker who reads the source to forge
      session data, password-reset tokens, and other signed values. Load SECRET_KEY
      from an environment variable or secrets manager so the key is never committed
      to source control.
    severity: ERROR
    languages: [python]
    metadata:
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      references:
        - https://docs.djangoproject.com/en/5.1/ref/settings/
        - https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
        - https://cwe.mitre.org/data/definitions/798.html
      category: security
      technology:
        - python
        - django
      confidence: MEDIUM
      license: MIT
      author: CRA Evidence
    pattern-either:
      - patterns:
          - pattern: SECRET_KEY = "..."
          - focus-metavariable: $VALUE
          - pattern: SECRET_KEY = $VALUE
          - metavariable-regex:
              metavariable: $VALUE
              regex: ^([bBrRuU]|[bB][rR]|[rR][bB])?['"][^'"]*[^'"\s]
      - patterns:
          - pattern: SECRET_KEY_FALLBACKS = ["...", ...]
          - focus-metavariable: $VALUE
          - pattern: SECRET_KEY_FALLBACKS = [$VALUE, ...]
          - metavariable-regex:
              metavariable: $VALUE
              regex: ^([bBrRuU]|[bB][rR]|[rR][bB])?['"][^'"]*[^'"\s]
