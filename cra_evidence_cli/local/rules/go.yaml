rules:
  - id: cra-go-weak-hash
    message: >
      MD5 or SHA-1 is used. Both are considered cryptographically broken and
      must not be used for security purposes such as signatures, MACs, or
      password hashing. Use SHA-256 or stronger (crypto/sha256, crypto/sha512).
    severity: WARNING
    metadata:
      cwe:
        - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      confidence: MEDIUM
      license: MIT
      author: CRA Evidence
    languages: [go]
    pattern-either:
      - pattern: md5.New()
      - pattern: md5.Sum(...)
      - pattern: sha1.New()
      - pattern: sha1.Sum(...)

  - id: cra-go-tls-insecure
    message: >
      tls.Config sets InsecureSkipVerify to true. This disables TLS certificate
      verification and allows a person-in-the-middle to intercept or modify
      traffic without detection. Remove InsecureSkipVerify or set it to false.
    severity: ERROR
    metadata:
      cwe:
        - "CWE-295: Improper Certificate Validation"
      confidence: HIGH
      license: MIT
      author: CRA Evidence
    languages: [go]
    pattern: "tls.Config{..., InsecureSkipVerify: true, ...}"

  - id: cra-go-hmac-timing
    message: >
      MAC value compared with bytes.Equal(), which is not constant-time. A
      timing side-channel allows an attacker to forge valid MACs by measuring
      comparison time. Use hmac.Equal() instead.
    severity: ERROR
    metadata:
      cwe:
        - "CWE-208: Observable Timing Discrepancy"
      confidence: HIGH
      license: MIT
      author: CRA Evidence
      origin: dgryski/semgrep-go rule use-hmac-equal, MIT
    languages: [go]
    pattern-either:
      - pattern: |
          $MAC = hmac.New(...)
          ...
          $H = $MAC.Sum(...)
          ...
          bytes.Equal($H, ...)
      - pattern: |
          $MAC = hmac.New(...)
          ...
          $H = $MAC.Sum(...)
          ...
          bytes.Equal(..., $H)

  - id: cra-go-hmac-reused-hash
    message: >
      hmac.New() receives a function that returns a shared hash instance
      rather than creating a fresh one on each call. The HMAC implementation
      calls the function to obtain a hash and then resets it; returning an
      existing instance means all HMAC operations share state, producing
      incorrect and potentially predictable output. Pass a constructor such
      as sha256.New, not a closure returning a pre-created hash.
    severity: ERROR
    metadata:
      cwe:
        - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      confidence: HIGH
      license: MIT
      author: CRA Evidence
      origin: dgryski/semgrep-go rule hmac-needs-new, MIT
    languages: [go]
    pattern-either:
      - pattern: |
          $H := $HASH.New()
          ...
          $FUNC := func() hash.Hash { return $H }
          ...
          hmac.New($FUNC, ...)
      - pattern: |
          $H := $HASH.New()
          ...
          hmac.New(func() hash.Hash { return $H }, ...)
      - pattern: |
          hmac.New(func() hash.Hash { return ($H : hash.Hash) }, ...)

  - id: cra-go-parseint-downcast
    message: >
      A value parsed as a 64-bit integer is downcast to int32 or uint32. If the
      value can exceed the 32-bit range and is not bounds-checked before the
      cast, it is silently truncated, which can cause integer overflow in
      security-sensitive contexts such as array bounds, token validation, or
      size checks. Parse with bitSize 32 to let strconv enforce the range, or
      add an explicit bounds check before the cast.
    severity: WARNING
    metadata:
      cwe:
        - "CWE-190: Integer Overflow or Wraparound"
      confidence: MEDIUM
      license: MIT
      author: CRA Evidence
      origin: dgryski/semgrep-go rule parseint-downcast, MIT
    languages: [go]
    patterns:
      - pattern-either:
          - pattern: |
              $X, ... = strconv.ParseInt(..., ..., 64)
              ...
              int32($X)
          - pattern: |
              $X, ... = strconv.ParseInt(..., ..., 64)
              ...
              uint32($X)
          - pattern: |
              $X, ... = strconv.ParseUint(..., ..., 64)
              ...
              int32($X)
          - pattern: |
              $X, ... = strconv.ParseUint(..., ..., 64)
              ...
              uint32($X)
          - pattern: |
              $X, $ERR = strconv.Atoi(...)
              ...
              int32($X)
          - pattern: |
              $X, $ERR = strconv.Atoi(...)
              ...
              uint32($X)
      - pattern-not-inside: |
          if <... math.MaxInt32 ...> { ... }
      - pattern-not-inside: |
          if <... math.MaxUint32 ...> { ... }
      - pattern-not: |
          $X, ... = $PARSE(...)
          ...
          if <... math.MaxInt32 ...> { ... }
          ...
      - pattern-not: |
          $X, ... = $PARSE(...)
          ...
          if <... math.MaxUint32 ...> { ... }
          ...

  - id: cra-go-wrong-lock-unlock
    message: >
      The lock and deferred unlock calls do not match. Mismatched pairs
      (Lock/RUnlock or RLock/Unlock) will deadlock or leave the mutex in an
      inconsistent state, which can be exploited to cause a denial of service.
      Pair Lock() with Unlock() and RLock() with RUnlock().
    severity: ERROR
    metadata:
      cwe:
        - "CWE-667: Improper Locking"
      confidence: HIGH
      license: MIT
      author: CRA Evidence
      origin: dgryski/semgrep-go rule wrong-lock-unlock, MIT
    languages: [go]
    pattern-either:
      - pattern: |
          $M.Lock()
          defer $M.RUnlock()
      - pattern: |
          $M.RLock()
          defer $M.Unlock()
      - pattern: |
          $M.Lock()
          defer $M.Lock()
      - pattern: |
          $M.RLock()
          defer $M.RLock()
