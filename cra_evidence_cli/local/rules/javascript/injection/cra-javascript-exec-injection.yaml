rules:
  - id: cra-javascript-exec-injection
    message: >
      child_process exec() or execSync() called with a command string built by
      concatenation. If any part of the string comes from untrusted input this
      allows OS command injection. Use execFile() or spawn() with an argument
      array instead.
    severity: ERROR
    metadata:
      cwe:
        - "CWE-78: Improper Neutralization of Special Elements used in an OS Command"
      owasp:
        - "A03:2021 - Injection"
      references:
        - https://cwe.mitre.org/data/definitions/78.html
        - https://owasp.org/Top10/A03_2021-Injection/
      category: security
      technology:
        - javascript
      confidence: MEDIUM
      license: MIT
      author: CRA Evidence
    languages: [javascript, typescript]
    pattern-either:
      - pattern: $CP.exec($A + $B, ...)
      - pattern: $CP.execSync($A + $B, ...)
      - pattern: require('child_process').exec($A + $B, ...)
      - pattern: require('child_process').execSync($A + $B, ...)
