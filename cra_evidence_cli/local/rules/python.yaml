rules:
  - id: cra-python-sql-injection
    message: >
      String formatting used to build a SQL query passed to execute(). This pattern
      can allow SQL injection when the formatted value includes untrusted input.
      Use parameterized queries instead (pass values as a second argument to execute()).
    severity: ERROR
    metadata:
      cwe:
        - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      confidence: MEDIUM
      license: MIT
      author: CRA Evidence
    languages: [python]
    pattern-either:
      - pattern: $CUR.execute($X % $Y)
      - pattern: $CUR.execute($X.format(...))
      - pattern: $CUR.execute(f"...")

  - id: cra-python-subprocess-shell
    message: >
      subprocess called with shell=True. When the command string includes
      untrusted input this can allow OS command injection. Pass arguments as a
      list and omit shell=True unless the shell is strictly required.
    severity: WARNING
    metadata:
      cwe:
        - "CWE-78: Improper Neutralization of Special Elements used in an OS Command"
      confidence: HIGH
      license: MIT
      author: CRA Evidence
    languages: [python]
    pattern: subprocess.$FUNC(..., shell=True, ...)

  - id: cra-python-yaml-load
    message: >
      yaml.load() without an explicit Loader can deserialize arbitrary Python
      objects when given untrusted YAML input. Use yaml.safe_load() or pass
      Loader=yaml.SafeLoader to restrict deserialization.
    severity: WARNING
    metadata:
      cwe:
        - "CWE-502: Deserialization of Untrusted Data"
      confidence: HIGH
      license: MIT
      author: CRA Evidence
    languages: [python]
    pattern: yaml.load($X)

  - id: cra-python-pickle-loads
    message: >
      pickle.loads() (or pickle.load()) deserializes arbitrary Python objects.
      Loading pickled data from an untrusted source allows remote code execution.
      Avoid deserializing pickle data from untrusted inputs; use a safe format
      such as JSON instead.
    severity: ERROR
    metadata:
      cwe:
        - "CWE-502: Deserialization of Untrusted Data"
      confidence: HIGH
      license: MIT
      author: CRA Evidence
    languages: [python]
    pattern-either:
      - pattern: pickle.loads(...)
      - pattern: pickle.load(...)
