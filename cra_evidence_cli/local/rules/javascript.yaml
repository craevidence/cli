rules:
  - id: cra-javascript-eval
    message: >
      eval() executes the string it receives as JavaScript. When the string
      includes untrusted input this allows code injection. Avoid eval(); use
      JSON.parse() for data, or structured alternatives for dynamic dispatch.
    severity: ERROR
    metadata:
      cwe:
        - "CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code"
      confidence: MEDIUM
      license: MIT
      author: CRA Evidence
    languages: [javascript, typescript]
    pattern: eval(...)

  - id: cra-javascript-exec-injection
    message: >
      child_process exec() or execSync() called with a command string built by
      concatenation. If any part of the string comes from untrusted input this
      allows OS command injection. Use execFile() or spawn() with an argument
      array instead.
    severity: ERROR
    metadata:
      cwe:
        - "CWE-78: Improper Neutralization of Special Elements used in an OS Command"
      confidence: MEDIUM
      license: MIT
      author: CRA Evidence
    languages: [javascript, typescript]
    pattern-either:
      - pattern: $CP.exec($A + $B, ...)
      - pattern: $CP.execSync($A + $B, ...)
      - pattern: require('child_process').exec($A + $B, ...)
      - pattern: require('child_process').execSync($A + $B, ...)
