# Grype vulnerability scan configuration for the CRA Evidence CLI Docker image.
#
# All entries below are HIGH (or above) findings that come from the Go modules
# statically linked into the bundled `syft` binary, which we ship at the latest
# released version (v1.45.1, built with go1.26.3). We cannot rebuild syft with
# newer Go modules ourselves; each fix depends on an upstream Anchore release.
#
# The DHI base image (`dhi.io/python:3.14`) is pinned to a digest that already
# carries the patched openssl (3.5.6-1~deb13u2) and libc6, so no base-OS
# suppressions are needed.
#
# We re-evaluate every suppression on 2026-07-24. Before that date, drop any
# entry whose upstream fix has shipped (see "Re-evaluate when" notes) and bump
# SYFT_VERSION in the Dockerfile to the release that contains it.
#
# Suppressions follow a simple analysis: the vulnerable code is not in the
# execute path of `craevidence` CLI normal operation. Syft is invoked only
# against user-supplied SBOM / container image inputs from the local file
# system or local Docker daemon - never against attacker-controlled network
# inputs, malicious git repositories, or HTTP servers. A formal OpenVEX
# statement is a tracked follow-up.

ignore:
  # ---------------------------------------------------------------------------
  # Go stdlib - statically linked into Syft v1.45.1 (built with go1.26.3)
  # ---------------------------------------------------------------------------
  # Re-evaluate when: Anchore ships a Syft release built with go1.26.4+
  # (or go1.25.11+). Verify with: syft version  (look for the GoVersion line).
  - vulnerability: CVE-2026-42504
    reason: "Go stdlib HIGH in Syft binary (go1.26.3). Fixed in go1.26.4 / go1.25.11. Latest Syft release (v1.45.1) still ships go1.26.3. Re-evaluate 2026-07-24."
  - vulnerability: GO-2026-5038
    reason: "Go stdlib HIGH in Syft binary (go1.26.3). Fixed in go1.26.4 / go1.25.11. Latest Syft release (v1.45.1) still ships go1.26.3. Re-evaluate 2026-07-24."

  # ---------------------------------------------------------------------------
  # containerd module - statically linked into Syft v1.45.1 binary
  # ---------------------------------------------------------------------------
  # Re-evaluate when: Anchore ships a Syft release with containerd/v2 >= 2.3.2.
  # Verify with: syft <image> -o cyclonedx-json | jq '.components[]|select(.name=="github.com/containerd/containerd/v2")'
  - vulnerability: GHSA-33vj-92qq-66hc
    reason: "containerd HIGH (v2.3.1 < 2.3.2) embedded in Syft binary. Syft uses containerd only to read image content, never runs containers, so the vulnerable runtime path is unreachable. Awaiting Syft dep bump. Re-evaluate 2026-07-24."
  - vulnerability: GHSA-rgh6-rfwx-v388
    reason: "containerd HIGH (v2.3.1 < 2.3.2) embedded in Syft binary. Syft uses containerd only to read image content, never runs containers, so the vulnerable runtime path is unreachable. Awaiting Syft dep bump. Re-evaluate 2026-07-24."
  - vulnerability: GHSA-xhf5-7wjv-pqxp
    reason: "containerd HIGH (v2.3.1 < 2.3.2) embedded in Syft binary. Syft uses containerd only to read image content, never runs containers, so the vulnerable runtime path is unreachable. Awaiting Syft dep bump. Re-evaluate 2026-07-24."

  # ---------------------------------------------------------------------------
  # docker/cli module - statically linked into Syft v1.45.1 binary
  # ---------------------------------------------------------------------------
  # The installed version (v29.4.3+incompatible) is already newer than the
  # advisory's fixed version (29.2.0+incompatible); Grype mismatches because of
  # +incompatible pseudo-version ordering. No action available on our side.
  # Re-evaluate when: Grype corrects the match or Syft pins a docker/cli the
  # matcher recognizes as fixed.
  - vulnerability: GO-2026-4610
    reason: "docker/cli HIGH embedded in Syft binary. Installed v29.4.3+incompatible is already newer than the advisory fixed version 29.2.0+incompatible; this is a Grype +incompatible version-ordering false positive. Re-evaluate 2026-07-24."
