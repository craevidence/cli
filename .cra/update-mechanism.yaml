# CRA Evidence CLI - Update Mechanism Documentation (CRA Art. 13(13))
# Validate: cue vet -c -d '#GuidanceCatalog' github.com/gemaraproj/gemara@v1.0.0 .cra/update-mechanism.yaml

title: "CRA Evidence CLI - Update Mechanism Documentation"
type: Best Practice
metadata:
  id: "cra-evidence-cli-update-mechanism"
  type: GuidanceCatalog
  gemara-version: "1.0.0"
  description: |
    Documents how customers receive and apply updates for the CRA Evidence CLI
    (the `craevidence` Python package and the `craevidence/cli` Docker image).
    Satisfies CRA Art. 13(13) - update mechanism documentation.
  version: "1.0.0"
  author:
    id: cra-evidence-engineering
    name: "CRA Evidence Engineering"
    type: Human

groups:
  - id: "distribution"
    title: "Distribution Channels"
    description: "Where and how CLI releases are published."
  - id: "verification"
    title: "Release Verification"
    description: "How customers verify the authenticity and integrity of a release."
  - id: "notification"
    title: "User Notification"
    description: "How customers learn about new releases, security fixes, and breaking changes."
  - id: "rollback"
    title: "Rollback Guidance"
    description: "How customers pin and roll back when an upgrade misbehaves."

guidelines:
  - id: "UPD.GL01"
    title: "Releases published through authenticated channels"
    objective: |
      Every CLI release MUST be published simultaneously to PyPI (`craevidence`)
      and Docker Hub (`craevidence/cli`). Both channels authenticate via HTTPS and
      project-owned credentials.
    group: "distribution"
    state: Active
    recommendations:
      - "Consume the CLI from PyPI or Docker Hub only; do not mirror through untrusted registries."
      - "Pin immutable tags for reproducibility (`craevidence/cli:<semver>@sha256:...`), not the `latest` tag."

  - id: "UPD.GL02"
    title: "Release artifacts are signed and addressable by digest"
    objective: |
      Each release MUST be cryptographically signed. Docker images MUST be signed
      with cosign (keyless / Sigstore OIDC); PyPI wheels MUST carry PEP 740 Sigstore
      attestations. Every published artifact is immutable and addressable by digest.
    group: "verification"
    state: Active
    recommendations:
      - "Verify `cosign verify craevidence/cli:<tag>` in CI before first use."
      - "Pin `craevidence==<version>` with a hash in `requirements.txt` or `pyproject.toml`."

  - id: "UPD.GL03"
    title: "Security updates communicated through a dedicated feed"
    objective: |
      Security-relevant releases MUST trigger a GitHub Security Advisory on the
      `craevidence/cli` repository within 24 hours of publication,
      and be announced on the CRA Evidence status page.
    group: "notification"
    state: Active
    recommendations:
      - "Subscribe to GitHub Security Advisories for the repo."
      - "Treat advisories with severity High or Critical as mandatory upgrades."

  - id: "UPD.GL04"
    title: "Semantic versioning discipline"
    objective: |
      CLI releases MUST follow SemVer. Breaking CLI flag or output changes
      only occur on major version bumps; security patches are always published
      as patch releases on every supported minor line.
    group: "notification"
    state: Active
    recommendations:
      - "Track the latest patch release of the minor line you have adopted."
      - "Read the release notes before adopting a new minor version."

  - id: "UPD.GL05"
    title: "Downgrade and rollback are supported"
    objective: |
      Customers MUST be able to roll back to the previous version at any time
      by pinning to a specific tag. No release deliberately breaks older SBOM
      or VEX file formats previously accepted by CRA Evidence.
    group: "rollback"
    state: Active
    recommendations:
      - "Keep the last known-good tag in your CI configuration alongside the current tag."
      - "Report regressions through the CVD policy channel if a rollback is required."
